# B3 blockwise config for strong-scaling sweep on jrc_mus-salivary-1.
# The harness rewrites the `workers` field per run; everything else is held
# fixed across worker counts.

data_path: "/nrs/cellmap/data/jrc_mus-salivary-1/jrc_mus-salivary-1.zarr/recon-1/em/fibsem-uint8/s1"
charge_group: "cellmap"
queue: "gpu_h100"

json_data:
  input_norm:
    MinMaxNormalizer:
      min_value: 0.0
      max_value: 255.0
    LambdaNormalizer:
      expression: "x*2-1"
  postprocess:
    ThresholdPostprocessor:
      threshold: 0.5

models:
  - type: "fly"
    scale: "s1"
    resolution: 16
    checkpoint: "/groups/cellmap/cellmap/zouinkhim/salevary/train/v2/distance/mito_16_all/model_checkpoint_20000"
    name: "mito_distance_16"
    classes:
      - "mito"

# Use a unique output path per sweep so blocks already on disk don't distort
# wall-time measurements. Update before running.
output_path: "/nrs/cellmap/zouinkhim/salivary/jrc_mus-salivary-1/jrc_mus-salivary-1.zarr/b3_mito_distance/s1"
task_name: "b3_strong_scaling_mito_distance"

# Replaced by run.py per N. Default kept for dry-run inspection.
workers: 1
